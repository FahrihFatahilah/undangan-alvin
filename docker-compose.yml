services:
  app:
    build: .
    ports:
      - "8111:8111"
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.undangan.rule=Host(`imah-alvin.my.id`)"
      - "traefik.http.routers.undangan.entrypoints=websecure"
      - "traefik.http.routers.undangan.tls=true"
      - "traefik.http.routers.undangan.tls.certresolver=letsencrypt"
      - "traefik.http.services.undangan.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
    networks:
      - traefik_net

volumes:
  sqlite_data:
  storage_data:

networks:
  traefik_net:
    external: true
